name: Test

"on":
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Check grid generator source
        run: |
          python - <<'PY'
          from pathlib import Path
          import grid_generator

          package_path = Path(grid_generator.__file__).resolve()
          assert "site-packages" in str(package_path), package_path
          assert "packages/icon-grid-generator" not in str(package_path), package_path
          print(package_path)
          PY

      - name: Ruff
        run: python -m ruff check icon4py_helper.py scripts tests

      - name: Tests
        run: python -m pytest -q
